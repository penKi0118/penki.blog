name: Deploy GitHub Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 部署到gh-pages分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./
          github_token: ${{ secrets.GITHUB_TOKEN }}
